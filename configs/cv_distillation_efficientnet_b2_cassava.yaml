# 5-fold CV distillation: EfficientNet-B2 teacher -> MobileNetV3-Small student.
# Teacher retrained per fold on the fold's training split (no test leakage).
experiment_name: cv_distill_efficientnet_b2_cassava

data_dir: data/raw/cassava
output_dir: outputs/cv_distill_efficientnet_b2_cassava
subset_prefix: null

n_folds: 5
pretrained: true

teacher_model_name: efficientnet_b2
student_model_name: mobilenet_v3_small

image_size: 224
batch_size: 64

# Student still improving past epoch 10 on Cassava -> 15.
epochs: 15
learning_rate: 0.0005
weight_decay: 0.0001

# EfficientNet-B2 fine-tunes on a similar schedule to ResNet50; 10 epochs with
# best-val checkpointing is enough.
teacher_epochs: 10
teacher_learning_rate: 0.0003

temperature: 4.0
alpha: 0.7

val_ratio: 0.15
seed: 42
num_workers: 2
