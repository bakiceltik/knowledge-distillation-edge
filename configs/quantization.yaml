experiment_name: student_quantized_potato

data_dir: data/raw/PlantVillage/train
output_dir: outputs/student_quantized_potato
subset_prefix: "Potato"

# Checkpoint produced by train_distillation.py
# Re-run scripts/run_distillation.sh if this file is missing (gitignored).
checkpoint: outputs/mobilenetv3_distilled_resnet50_potato_subset/best_model.pth

model_name: mobilenet_v3_small
num_classes: 3

image_size: 224
batch_size: 32
val_ratio: 0.15
test_ratio: 0.15
seed: 42
num_workers: 2

quantization:
  # post_training_static  — FX PTQ, needs calibration data (recommended)
  # post_training_dynamic — weights-only, no calibration needed
  mode: post_training_static
  # fbgemm for x86 (Windows/Linux desktop), qnnpack for ARM edge devices
  backend: fbgemm
  # number of train batches used for calibration (8 × 32 = 256 images)
  calibration_batches: 8
