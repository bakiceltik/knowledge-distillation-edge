# 5-fold CV of the ViT-B/16 teacher trained supervised (baseline mode).
# ViT requires image_size 224 and uses a smaller learning rate / batch size.
experiment_name: cv_teacher_vit_b16_cassava

data_dir: data/raw/cassava
output_dir: outputs/cv_teacher_vit_b16_cassava
subset_prefix: null

n_folds: 5

model_name: vit_b_16
pretrained: true

image_size: 224
batch_size: 32
epochs: 10
learning_rate: 0.0001
weight_decay: 0.0001

val_ratio: 0.15
seed: 42
num_workers: 2
