# Single-split KD sensitivity ablation for the ResNet50 teacher.
# The teacher is trained once on fold 0 of the Cassava cross-validation split,
# then reused (frozen) for every (alpha, T) cell -- alpha and T affect only the
# student loss. Two 1-D sweeps cross at the main-study default (T=4.0, alpha=0.7),
# which is trained only once. This complements (does not replace) the
# cross-validated main study; results are single-split point estimates.
experiment_name: ablation_resnet50_cassava

data_dir: data/raw/cassava
output_dir: outputs/ablation_resnet50_cassava
subset_prefix: null

# Reuse fold 0 of the same stratified 5-fold partition as the main study.
n_folds: 5
fold: 0

pretrained: true

teacher_model_name: resnet50
student_model_name: mobilenet_v3_small

image_size: 224
batch_size: 64

# Teacher schedule (trained once), matching the main study.
teacher_epochs: 10
teacher_learning_rate: 0.0003

# Student distillation schedule, matching the main study.
epochs: 15
learning_rate: 0.0005
weight_decay: 0.0001

# Sweep grid. Center point (T=4.0, alpha=0.7) is shared by both sweeps and
# trained only once.
temperature_center: 4.0
alpha_center: 0.7
temperature_sweep: [1.0, 2.0, 4.0, 8.0]
alpha_sweep: [0.3, 0.5, 0.7, 0.9]

val_ratio: 0.15
seed: 42
num_workers: 2
