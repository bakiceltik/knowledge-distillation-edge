project:
  name: knowledge-distillation-edge
  task: plant-disease-classification
  seed: 42
  device: cuda
  num_workers: 4

data:
  dataset_name: PlantVillage
  root: data/plantvillage
  train_split: train
  val_split: val
  test_split: test
  image_size: 224
  num_classes: null

train:
  batch_size: 32
  epochs: 20
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001

evaluation:
  metrics:
    - accuracy
    - macro_f1
    - parameter_count
    - model_size_mb
    - latency_ms

logging:
  output_dir: outputs
  checkpoint_dir: checkpoints
  log_interval: 20
