# 5-fold CV of the ResNet50 teacher trained supervised (baseline mode).
# Reports the teacher's own cross-validated test performance, matching the
# per-fold teacher used inside the distillation runs (same split, same seed,
# same 10-epoch schedule).
experiment_name: cv_teacher_resnet50_cassava

data_dir: data/raw/cassava
output_dir: outputs/cv_teacher_resnet50_cassava
subset_prefix: null

n_folds: 5

model_name: resnet50
pretrained: true

image_size: 224
batch_size: 64
epochs: 10
learning_rate: 0.0003
weight_decay: 0.0001

val_ratio: 0.15
seed: 42
num_workers: 2
