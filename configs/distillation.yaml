experiment_name: distillation_resnet50_to_mobilenetv3

data_dir: data/raw/PlantVillage
output_dir: outputs/distillation_resnet50_to_mobilenetv3
subset_prefix: null  # null = use all classes

teacher_model: resnet50
student_model: mobilenet_v3_small
pretrained: true

# Teacher checkpoint produced in a previous training run
teacher_checkpoint: outputs/resnet50_full/model_best.pt

image_size: 224
batch_size: 32
epochs: 30
learning_rate: 0.0005
weight_decay: 0.0001

val_ratio: 0.15
test_ratio: 0.15
seed: 42
num_workers: 2

# Distillation hyperparameters
temperature: 4.0
alpha: 0.5  # weight for soft-target KL loss; (1-alpha) for hard-label CE
